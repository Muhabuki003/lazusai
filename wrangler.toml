name = "lazusai"
# The deployed Pages app is the committed landing/ directory: the marketing
# site (index.html, lazusai-logo.svg), the operator/admin pages, and
# landing/_worker.js — the Pages worker that handles /api/demo-request,
# /api/signup, Stripe webhooks and operator auth, and serves everything else
# as static assets. No build step is required.
#
# (scripts/build-worker.mjs + dist/ is the legacy manual-deploy path for the
# old n8n-era webhook router in src/worker.js; it is NOT what this Pages
# project publishes, and its CLIENTS_KV binding is not needed here.)
pages_build_output_dir = "landing"
compatibility_date = "2024-09-23"

[vars]
# LazusAI Core API on the VPS, exposed via the Cloudflare Tunnel. Used by
# landing/_worker.js for demo requests, signups and the operator dashboard.
CORE_API_URL = "https://core.lazusai.com"
# Legacy vars for the old n8n webhook router (src/worker.js); unused by the
# landing worker but kept for manual deploys of that path.
N8N_BASE_URL = "https://n8n.bookistudios.com"
N8N_WEBHOOK_PATH = "/webhook/lazusai-inbound"

# Secrets — set in the Pages project (Settings → Environment variables), or
# with `npx wrangler pages secret put <NAME>` (do NOT commit them):
#   LAZUSAI_CORE_KEY       shared key sent to the Core API as X-LazusAI-Key
#   ADMIN_USER             HTTP Basic auth username for /admin*
#   ADMIN_PASSWORD         HTTP Basic auth password for /admin*
#   STRIPE_SECRET_KEY      optional — enables self-serve Stripe signup
#   STRIPE_WEBHOOK_SECRET  optional — Stripe webhook verification
#   STRIPE_PRICE_STARTER   optional — monthly subscription price id
#   STRIPE_PRICE_PRO       optional — monthly subscription price id
