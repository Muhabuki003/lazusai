name = "lazusai"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"

# KV holds routing (route:<id> -> client_id), client config (client:<id>) and
# dashboard credentials (auth:<id>). Create it once:
#   npx wrangler kv namespace create CLIENTS_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "CLIENTS_KV"
id = "452fbbb7ec0a47febddea03440193f1d"

# The admin dashboard is compiled into the Pages bundle by `npm run build`,
# which reads admin/dashboard.html into dist/_worker.js. Always run
# the build before deploy (npm run deploy does both).

[vars]
N8N_BASE_URL = "https://n8n.bookistudios.com"
N8N_WEBHOOK_PATH = "/webhook/lazusai-inbound"
# LazusAI Core API on the VPS, exposed via the Cloudflare Tunnel. Backs the
# admin dashboard /api/* data endpoints.
CORE_API_URL = "https://core.lazusai.com"

# Secret — set with `npx wrangler pages secret put N8N_API_KEY` (do NOT commit it):
#   N8N_API_KEY   shared secret sent to n8n as X-LazusAI-Key
