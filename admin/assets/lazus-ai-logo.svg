<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150" role="img" aria-label="LAZUS AI">
  <defs>
    <style>
      .wm { font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 78px; letter-spacing: 6px; }
    </style>
  </defs>

  <!-- Robot mark -->
  <g transform="translate(20 18)">
    <!-- black hexagon bracket frame -->
    <path d="M16 10 H44 L30 24 H16 Z" fill="#111"/>
    <path d="M104 10 H76 L90 24 H104 Z" fill="#111"/>
    <path d="M8 18 V44 L20 32 V30 Z" fill="#111"/>
    <path d="M112 18 V44 L100 32 V30 Z" fill="#111"/>
    <path d="M16 104 H44 L30 90 H16 Z" fill="#111"/>
    <path d="M104 104 H76 L90 90 H104 Z" fill="#111"/>
    <path d="M8 96 V70 L20 82 V84 Z" fill="#111"/>
    <path d="M112 96 V70 L100 82 V84 Z" fill="#111"/>

    <!-- antenna -->
    <line x1="60" y1="22" x2="60" y2="10" stroke="#e8312a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="8" r="5" fill="#e8312a"/>

    <!-- head: red speech-bubble face -->
    <path d="M34 24 H86 a14 14 0 0 1 14 14 V70 a14 14 0 0 1 -14 14 H52 l-12 14 v-14 H34 a14 14 0 0 1 -14 -14 V38 a14 14 0 0 1 14 -14 Z"
          fill="#e8312a"/>

    <!-- happy eyes -->
    <path d="M40 52 q9 -12 18 0" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <path d="M62 52 q9 -12 18 0" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M48 64 q12 12 24 0" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>

    <!-- secondary chat bubble with dots -->
    <g transform="translate(78 66)">
      <path d="M6 0 H34 a8 8 0 0 1 8 8 V20 a8 8 0 0 1 -8 8 H18 l-8 9 v-9 H6 a8 8 0 0 1 -8 -8 V8 a8 8 0 0 1 8 -8 Z" fill="#e8312a"/>
      <circle cx="12" cy="14" r="3" fill="#fff"/>
      <circle cx="20" cy="14" r="3" fill="#fff"/>
      <circle cx="28" cy="14" r="3" fill="#fff"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="150" y="98" class="wm" fill="#111">LAZUS</text>
  <text x="478" y="98" class="wm" fill="#e8312a">AI</text>
</svg>
